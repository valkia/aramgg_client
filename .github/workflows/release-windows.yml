name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest
    timeout-minutes: 45

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'
          cache: npm

      - name: Print tool versions
        run: |
          node --version
          npm --version

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $packageVersion = node -p "require('./package.json').version"
          $expectedTag = "v$packageVersion"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
            Write-Error "Release tag '$env:GITHUB_REF_NAME' does not match package.json version '$packageVersion'. Expected '$expectedTag'."
            exit 1
          }

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm run test:unit

      - name: Package Windows installer
        shell: pwsh
        run: |
          $env:ELECTRON_CACHE = Join-Path $env:RUNNER_TEMP 'electron-cache'
          $env:ELECTRON_BUILDER_CACHE = Join-Path $env:RUNNER_TEMP 'electron-builder-cache'
          npm run pack

          $clientDataCurrent = Join-Path $PWD 'build/win-unpacked/resources/client-data/current.json'
          if (!(Test-Path $clientDataCurrent)) {
            Write-Error "Packaged client-data current.json was not found at $clientDataCurrent"
            exit 1
          }

          $clientData = Get-Content $clientDataCurrent -Raw | ConvertFrom-Json
          $shardDir = Join-Path $PWD "build/win-unpacked/resources/client-data/versions/$($clientData.dataVersion)/champion-shards"
          $shardCount = @(Get-ChildItem $shardDir -Filter '*.json' -File | Where-Object { $_.Name -ne 'index.json' }).Count
          Write-Host "Packaged client-data dataVersion=$($clientData.dataVersion) gamePatch=$($clientData.gamePatch) generatedAt=$($clientData.generatedAt) files=$($clientData.bundledFileCount) shards=$shardCount bytes=$($clientData.bundledBytes)"

          if ($shardCount -lt 40) {
            Write-Error "Packaged client-data shard count is too low: $shardCount"
            exit 1
          }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: aramgg-client-windows
          if-no-files-found: error
          path: |
            build/*.exe
            build/*.exe.blockmap
            build/latest.yml

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $assets = @(
            Get-ChildItem -Path build -Filter '*.exe' -File
            Get-ChildItem -Path build -Filter '*.exe.blockmap' -File
            Get-Item -Path build/latest.yml
          )

          if ($assets.Count -lt 3) {
            Write-Error "Expected release assets were not found in build/"
            exit 1
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            $notes = @(
              'Windows installer generated by GitHub Actions.'
              ''
              'Assets:'
              '- `aramgg_client Setup *.exe`'
              '- `aramgg_client Setup *.exe.blockmap`'
              '- `latest.yml`'
            ) -join [Environment]::NewLine
            gh release create $tag --title $tag --notes $notes
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

          foreach ($asset in $assets) {
            gh release upload $tag $asset.FullName --clobber
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }
