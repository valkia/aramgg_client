name: Build Windows Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag, for example v0.1.0. Keep it aligned with package.json version.'
        required: true
        default: 'v0.1.0'
      prerelease:
        description: 'Mark the GitHub release as a prerelease.'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest
    timeout-minutes: 45

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      ELECTRON_CACHE: ${{ runner.temp }}\electron-cache
      ELECTRON_BUILDER_CACHE: ${{ runner.temp }}\electron-builder-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm run test:unit

      - name: Package Windows installer
        run: npm run pack

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: aramgg-client-windows-${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          if-no-files-found: error
          path: |
            build/*.exe
            build/*.exe.blockmap
            build/latest.yml

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          target_commitish: ${{ github.sha }}
          name: ARAMGG Client ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          fail_on_unmatched_files: true
          body: |
            Windows installer generated by GitHub Actions.

            Assets:
            - `aramgg_client Setup *.exe`
            - `aramgg_client Setup *.exe.blockmap`
            - `latest.yml`
          files: |
            build/*.exe
            build/*.exe.blockmap
            build/latest.yml
