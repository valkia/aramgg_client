name: Build Windows Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest
    timeout-minutes: 45

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'
          cache: npm

      - name: Print tool versions
        run: |
          node --version
          npm --version

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $packageVersion = node -p "require('./package.json').version"
          $expectedTag = "v$packageVersion"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
            Write-Error "Release tag '$env:GITHUB_REF_NAME' does not match package.json version '$packageVersion'. Expected '$expectedTag'."
            exit 1
          }

      - name: Install dependencies
        shell: pwsh
        run: |
          $env:ELECTRON_CACHE = Join-Path $env:RUNNER_TEMP 'electron-cache'
          npm ci --foreground-scripts

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm run test:unit

      - name: Package Windows installer
        shell: pwsh
        run: |
          $env:ELECTRON_CACHE = Join-Path $env:RUNNER_TEMP 'electron-cache'
          $env:ELECTRON_BUILDER_CACHE = Join-Path $env:RUNNER_TEMP 'electron-builder-cache'
          npm run pack

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: aramgg-client-windows
          if-no-files-found: error
          path: |
            build/*.exe
            build/*.exe.blockmap
            build/latest.yml

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          body: |
            Windows installer generated by GitHub Actions.

            Assets:
            - `aramgg_client Setup *.exe`
            - `aramgg_client Setup *.exe.blockmap`
            - `latest.yml`
          files: |
            build/*.exe
            build/*.exe.blockmap
            build/latest.yml
