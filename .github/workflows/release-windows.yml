name: Build Windows Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag, for example v0.1.0. Keep it aligned with package.json version.'
        required: true
        default: 'v0.1.0'
      prerelease:
        description: 'Mark the GitHub release as a prerelease.'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest
    timeout-minutes: 45

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare release metadata
        shell: pwsh
        run: |
          $event = Get-Content $env:GITHUB_EVENT_PATH | ConvertFrom-Json

          if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') {
            $releaseTag = $event.inputs.tag_name
            $prerelease = if ($event.inputs.prerelease -eq $true -or $event.inputs.prerelease -eq 'true') { 'true' } else { 'false' }
          } else {
            $releaseTag = $env:GITHUB_REF_NAME
            $prerelease = 'false'
          }

          "RELEASE_TAG=$releaseTag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "RELEASE_PRERELEASE=$prerelease" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm run test:unit

      - name: Package Windows installer
        shell: pwsh
        run: |
          $env:ELECTRON_CACHE = Join-Path $env:RUNNER_TEMP 'electron-cache'
          $env:ELECTRON_BUILDER_CACHE = Join-Path $env:RUNNER_TEMP 'electron-builder-cache'
          npm run pack

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: aramgg-client-windows-${{ env.RELEASE_TAG }}
          if-no-files-found: error
          path: |
            build/*.exe
            build/*.exe.blockmap
            build/latest.yml

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: ARAMGG Client ${{ env.RELEASE_TAG }}
          prerelease: ${{ env.RELEASE_PRERELEASE }}
          fail_on_unmatched_files: true
          body: |
            Windows installer generated by GitHub Actions.

            Assets:
            - `aramgg_client Setup *.exe`
            - `aramgg_client Setup *.exe.blockmap`
            - `latest.yml`
          files: |
            build/*.exe
            build/*.exe.blockmap
            build/latest.yml
